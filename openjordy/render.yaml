services:
  - type: web
    name: openjordy
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENJORDY_STATE_DIR
        value: /data/.openjordy
      - key: OPENJORDY_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENJORDY_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: openjordy-data
      mountPath: /data
      sizeGB: 1
